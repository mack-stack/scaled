services:
  - type: web
    name: scaled-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m scaled.db.seed 2>/dev/null; uvicorn scaled.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///scaled.db
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-6
    plan: free
